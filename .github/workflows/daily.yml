name: 🏠 Daily Apartment Search

on:
  schedule:
    - cron: '0 6 * * *'   # כל יום ב-08:00 שעון ישראל (06:00 UTC)
  workflow_dispatch:        # הפעלה ידנית מ-GitHub

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        run: python scraper.py

      - name: Save seen listings to repo
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add seen_listings.json
          git diff --staged --quiet || git commit -m "update seen listings [skip ci]"
          git pull --rebase origin main && git push
